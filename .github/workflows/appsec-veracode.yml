# Benchmark scan — manual trigger only. No auto-runs, no PR decoration, no pipeline failures.
# Part of the Guidepoint AppSec Tool Benchmarking program (Phase 1).

name: "AppSec Benchmark — Veracode [icpctools]"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  veracode:
    name: Veracode Pipeline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Ant
        run: sudo apt-get update -q && sudo apt-get install -y ant

      - name: Build with Ant
        run: ant build
        continue-on-error: true

      - name: Create results directory
        run: mkdir -p results/veracode

      - name: Zip compiled artifacts for Veracode
        # Include dist/ and any generated jars; fall back to source if build output is absent.
        run: |
          if [ -d dist ] || find . -name "*.jar" -not -path "*/node_modules/*" | grep -q .; then
            zip -r results/veracode/artifacts.zip dist/ $(find . -name "*.jar" -not -path "*/node_modules/*" 2>/dev/null) 2>/dev/null || true
          else
            echo "No compiled artifacts found — zipping source as fallback"
            zip -r results/veracode/artifacts.zip . --exclude "*.git*" --exclude "results/*"
          fi

      - name: Run Veracode Pipeline Scan
        uses: veracode/Veracode-GitHub-Actions/pipeline-scan@v0.1.0
        continue-on-error: true
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: "results/veracode/artifacts.zip"
          fail_on_severity: ""
          json_output_file: "results/veracode/veracode-results.json"

      - name: Upload Veracode results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-results
          path: results/veracode/
          if-no-files-found: warn
