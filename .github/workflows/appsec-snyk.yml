# Benchmark scan — manual trigger only. No auto-runs, no PR decoration, no pipeline failures.
# Part of the Guidepoint AppSec Tool Benchmarking program (Phase 1).

name: "AppSec Benchmark — Snyk [icpctools]"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create results directory
        run: mkdir -p results/snyk

      - name: Run Snyk Code scan
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: code test --sarif-file-output=results/snyk/snyk-code.sarif --severity-threshold=low

      - name: Upload Snyk Code results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results
          path: results/snyk/

  snyk-opensource:
    name: Snyk Open Source (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create results directory
        run: mkdir -p results/snyk

      - name: Run Snyk Open Source scan
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test --json-file-output=results/snyk/snyk-opensource.json --severity-threshold=low

      - name: Upload Snyk Open Source results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results
          path: results/snyk/
