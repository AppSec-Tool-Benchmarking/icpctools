# Benchmark scan — manual trigger only. No auto-runs, no MR decoration, no pipeline failures.

appsec-checkmarx:
  stage: test
  image: ubuntu:22.04
  when: manual
  allow_failure: true
  variables:
    CX_BASE_URI: $CI_CX_BASE_URI
    CX_TENANT: $CI_CX_TENANT
    CX_CLIENT_ID: $CI_CX_CLIENT_ID
    CX_CLIENT_SECRET: $CI_CX_CLIENT_SECRET
  script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -LO https://github.com/Checkmarx/ast-cli/releases/latest/download/ast-cli_linux_amd64.tar.gz
    - tar -xzf ast-cli_linux_amd64.tar.gz
    - install cx /usr/local/bin/cx
    - mkdir -p results/checkmarx
    - cx scan create --scan-types sast --project-name "icpctools-benchmark" --output-path results/checkmarx/ --output-format sarif --async false || true
  artifacts:
    when: always
    paths:
      - results/checkmarx/
    expire_in: 30 days
